<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>GBA 3D Mobile Emulator</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
      -webkit-user-select: none;
    }

    body {
      background-color: #0d0e12;
      color: #f1f2f6;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 10px;
    }

    header {
      width: 100%;
      max-width: 800px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 15px;
      padding: 12px;
      background: #15161e;
      border-radius: 8px;
      border: 1px solid #232530;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    h1 {
      font-size: 1.2rem;
      font-weight: 700;
      color: #7a52ff;
    }

    .status-badge {
      font-size: 0.75rem;
      padding: 3px 8px;
      border-radius: 12px;
      background: #333;
      color: #aaa;
    }

    .controls-panel {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    select, button {
      font-size: 0.85rem;
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid #2e303e;
      background: #1d1e2a;
      color: #f1f2f6;
      outline: none;
      cursor: pointer;
    }

    select {
      flex: 1;
      min-width: 180px;
    }

    button {
      background: #7a52ff;
      border: none;
      font-weight: bold;
    }

    button:active {
      background: #6236ff;
    }

    button.btn-danger {
      background: #f03e3e;
    }

    .upload-btn-wrapper {
      position: relative;
      overflow: hidden;
      display: inline-block;
    }

    .upload-btn-wrapper input[type=file] {
      position: absolute;
      left: 0;
      top: 0;
      opacity: 0;
      width: 100%;
      height: 100%;
      cursor: pointer;
    }

    /* Гарантована висота вікна емулятора */
    .emulator-wrapper {
      width: 100%;
      max-width: 800px;
      height: 60vh;
      min-height: 320px;
      max-height: 480px;
      background: #000;
      border-radius: 12px;
      border: 4px solid #232530;
      position: relative;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    #emulator-container {
      width: 100%;
      height: 100%;
      position: relative;
    }

    /* Стилі для iframe або вбудованого вікна */
    #emu-target {
      width: 100%;
      height: 100%;
    }

    .placeholder-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 15px;
      color: #8c8fa1;
      text-align: center;
      padding: 20px;
      background: #0d0e12;
      z-index: 10;
    }

    .placeholder-screen svg {
      width: 64px;
      height: 64px;
      fill: #4c4f69;
    }

    .notification {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #232530;
      border: 1px solid #7a52ff;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 0.9rem;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
      display: none;
      z-index: 9999;
      text-align: center;
      max-width: 90%;
    }

    .info-panel {
      width: 100%;
      max-width: 800px;
      margin-top: 15px;
      padding: 15px;
      background: #15161e;
      border-radius: 8px;
      font-size: 0.85rem;
      line-height: 1.4;
      color: #a6adc8;
      border: 1px solid #232530;
    }
  </style>
</head>
<body>

  <header>
    <div class="header-top">
      <h1>GBA 3D MOBILE</h1>
      <span class="status-badge" id="storage-status">Запуск...</span>
    </div>
    
    <div class="controls-panel">
      <select id="rom-select">
        <option value="">-- Оберіть збережену гру --</option>
      </select>
      
      <div class="upload-btn-wrapper">
        <button class="btn">Додати інший .gba</button>
        <input type="file" id="file-input" accept=".gba">
      </div>

      <button id="btn-delete" class="btn-danger">Видалити</button>
    </div>
  </header>

  <main class="emulator-wrapper">
    <div id="emulator-container">
      <div class="placeholder-screen" id="placeholder">
        <svg viewBox="0 0 24 24">
          <path d="M21,6H3C1.9,6,1,6.9,1,8v8c0,1.1,0.9,2,2,2h18c1.1,0,2-0.9,2-2V8C23,6.9,22.1,6,21,6z M9,14H7v2H5v-2H3v-2h2V10h2v2h2V14z M15,15c-0.55,0-1-0.45-1-1s0.45-1,1-1s1,0.45,1,1S15.55,15,15,15z M18,13c-0.55,0-1-0.45-1-1s0.45-1,1-1s1,0.45,1,1S18.55,13,18,13z"/>
        </svg>
        <p id="placeholder-text">Завантаження та налаштування бази даних...</p>
      </div>
    </div>
  </main>

  <section class="info-panel">
    <p><strong>Попередження:</strong> Емулятор працює лише за умови запуску через веб-сервер (наприклад, GitHub Pages або локальний сервер VS Code). При прямому відкритті файлу з диска виникне помилка безпеки.</p>
  </section>

  <div class="notification" id="notification">Повідомлення</div>

  <script>
    let db = null;
    const DB_NAME = "GBA_Emulator_DB";
    const STORE_NAME = "rom_store";
    const DEFAULT_ROM_NAME = "Emerald Version (USA, Europe).gba";
    const DEFAULT_ROM_URL = "./Emerald Version (USA, Europe).gba";
    const notification = document.getElementById("notification");

    function showToast(text) {
      notification.textContent = text;
      notification.style.display = "block";
      setTimeout(() => {
        notification.style.display = "none";
      }, 4000);
    }

    // Крок 1. Ініціалізація IndexedDB
    function initDB(callback) {
      const request = indexedDB.open(DB_NAME, 1);

      request.onupgradeneeded = function(e) {
        const database = e.target.result;
        if (!database.objectStoreNames.contains(STORE_NAME)) {
          database.createObjectStore(STORE_NAME, { keyPath: "name" });
        }
      };

      request.onsuccess = function(e) {
        db = e.target.result;
        document.getElementById("storage-status").textContent = "Пам'ять: OK";
        document.getElementById("placeholder-text").textContent = "Очікування вибору гри...";
        if (callback) callback();
      };

      request.onerror = function(e) {
        console.error("Помилка бази даних:", e);
        document.getElementById("storage-status").textContent = "Помилка CORS/Браузера";
        showToast("Помилка безпеки браузера. Запустіть сайт через локальний сервер.");
      };
    }

    // Крок 2. Перевірка наявності дефолтної гри та її автоматичне завантаження
    function checkAndLoadDefaultRom() {
      const transaction = db.transaction([STORE_NAME], "readonly");
      const store = transaction.objectStore(STORE_NAME);
      const request = store.get(DEFAULT_ROM_NAME);

      request.onsuccess = function(e) {
        if (e.target.result) {
          // Гра вже є в базі даних
          updateRomList();
          playRom(DEFAULT_ROM_NAME);
        } else {
          // Гри немає в базі, намагаємося скачати її з вашого репозиторію
          downloadDefaultRom();
        }
      };
    }

    async function downloadDefaultRom() {
      document.getElementById("placeholder-text").textContent = "Завантаження дефолтної гри у пам'ять телефону...";
      showToast("Завантажуємо Emerald Version. Це відбудеться лише один раз...");

      try {
        const response = await fetch(DEFAULT_ROM_URL);
        if (!response.ok) {
          throw new Error("Файл не знайдено на сервері");
        }
        const arrayBuffer = await response.arrayBuffer();

        const transaction = db.transaction([STORE_NAME], "readwrite");
        const store = transaction.objectStore(STORE_NAME);
        store.put({ name: DEFAULT_ROM_NAME, data: arrayBuffer });

        transaction.oncomplete = function() {
          showToast("Гру успішно збережено офлайн!");
          updateRomList();
          playRom(DEFAULT_ROM_NAME);
        };
      } catch (err) {
        console.error(err);
        document.getElementById("placeholder-text").textContent = "Помилка. Додайте файл гри в папку або завантажте вручну.";
        showToast("Не вдалося автоматично знайти файл гри в папці сайту.");
      }
    }

    // Крок 3. Оновлення списку ігор у меню
    function updateRomList() {
      if (!db) return;
      const transaction = db.transaction([STORE_NAME], "readonly");
      const store = transaction.objectStore(STORE_NAME);
      const request = store.getAllKeys();

      request.onsuccess = function(e) {
        const keys = e.target.result;
        const select = document.getElementById("rom-select");
        select.innerHTML = '<option value="">-- Оберіть збережену гру --</option>';
        
        keys.forEach(key => {
          const opt = document.createElement("option");
          opt.value = key;
          opt.textContent = key;
          if (key === DEFAULT_ROM_NAME) {
            opt.selected = true;
          }
          select.appendChild(opt);
        });
      };
    }

    // Крок 4. Запуск емулятора
    function playRom(name) {
      const transaction = db.transaction([STORE_NAME], "readonly");
      const store = transaction.objectStore(STORE_NAME);
      const request = store.get(name);

      request.onsuccess = function(e) {
        const record = e.target.result;
        if (!record) return;

        // Перетворюємо збережений у базі масив байтів на посилання для емулятора
        const blob = new Blob([record.data], { type: "application/octet-stream" });
        const blobUrl = URL.createObjectURL(blob);

        const container = document.getElementById("emulator-container");
        container.innerHTML = ""; // Прибираємо плейсхолдер

        const emuDiv = document.createElement("div");
        emuDiv.id = "emu-target";
        container.appendChild(emuDiv);

        // Налаштування EmulatorJS
        window.EmuJS = {
          // Надійне джерело файлів ядра від офіційного сервера розробників
          rootUrl: "https://emulatorjs.org/emulatorjs/data/",
          rom: blobUrl,
          system: "gba",
          autoStart: true,
          showControls: true, // мобільні кнопки керування
          loadState: true,
          saveState: true
        };

        // Завантажуємо скрипт-ініціалізатор
        const loaderScript = document.createElement("script");
        loaderScript.src = "https://emulatorjs.org/emulatorjs/data/loader.js";
        document.body.appendChild(loaderScript);
        
        showToast("Запуск гри...");
      };
    }

    // Ручне додавання інших файлів .gba користувачем
    document.getElementById("file-input").addEventListener("change", function(e) {
      const file = e.target.files[0];
      if (!file) return;

      showToast("Збереження нової гри...");
      const reader = new FileReader();
      reader.onload = function(evt) {
        const transaction = db.transaction([STORE_NAME], "readwrite");
        const store = transaction.objectStore(STORE_NAME);
        store.put({ name: file.name, data: evt.target.result });

        transaction.oncomplete = function() {
          showToast("Гру збережено!");
          updateRomList();
          playRom(file.name);
        };
      };
      reader.readAsArrayBuffer(file);
    });

    // Видалення гри
    document.getElementById("btn-delete").addEventListener("click", function() {
      const select = document.getElementById("rom-select");
      const selectedGame = select.value;
      if (!selectedGame) return;

      if (confirm(`Видалити "${selectedGame}" з пам'яті?`)) {
        const transaction = db.transaction([STORE_NAME], "readwrite");
        const store = transaction.objectStore(STORE_NAME);
        store.delete(selectedGame);
        transaction.oncomplete = function() {
          location.reload(); // Перезавантажуємо сторінку для чистого скидання стану
        };
      }
    });

    document.getElementById("rom-select").addEventListener("change", function(e) {
      if (e.target.value) {
        playRom(e.target.value);
      }
    });

    // Запуск
    window.addEventListener("load", function() {
      initDB(function() {
        checkAndLoadDefaultRom();
      });
    });
  </script>
</body>
</html>
